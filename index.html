<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="BIN_BUILD_ID" content="2026-06-03-WHITE-PLATINUM-BOOT-002" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>BIN GROUP | UAE Property Operations OS</title>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="BIN GROUP" />
    <meta name="theme-color" content="#FFFFFF" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="description" content="BIN GROUP Super App for UAE property owners, tenants, technicians, brokers, maintenance contracts, property management, AI Design Studio, documents, payments, and real-time operations." />
    <meta property="og:title" content="BIN GROUP | UAE Property Operations OS" />
    <meta property="og:description" content="The no-call property operations platform for UAE maintenance, property management, contracts, tenants, technicians, brokers, and AI design." />
    <meta property="og:image" content="https://bin-groups.com/logo.png" />
    <meta property="og:url" content="https://bin-groups.com" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <style>
      html, body, #root { min-height: 100%; }
      * { box-sizing: border-box; }
      body {
        background: #FFFFFF;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        overflow-y: auto;
        touch-action: pan-y;
        -webkit-overflow-scrolling: touch;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body::before {
        content: "BIN GROUP";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #111827;
        font-size: min(18vw, 180px);
        font-weight: 950;
        letter-spacing: -0.08em;
        opacity: 0.035;
      }
      #root { position: relative; z-index: 1; }
      #bin-boot-loader {
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at 90% 8%, rgba(198, 167, 94, 0.18), transparent 28rem), radial-gradient(circle at 10% 95%, rgba(192, 198, 207, 0.26), transparent 30rem), linear-gradient(180deg, #FFFFFF 0%, #F7F7F4 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        color: #111827;
        transition: opacity .35s ease, visibility .35s ease;
      }
      #bin-boot-loader.bin-boot-hidden { opacity: 0; visibility: hidden; pointer-events: none; }
      .bin-boot-ring {
        width: 118px;
        height: 118px;
        border: 1px solid rgba(198,167,94,0.18);
        border-radius: 999px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 34px;
        background: rgba(255,255,255,0.78);
        box-shadow: 0 26px 70px rgba(17,24,39,0.10);
      }
      .bin-boot-spinner {
        width: 76px;
        height: 76px;
        border: 4px solid rgba(198,167,94,0.25);
        border-top-color: #C6A75E;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      .bin-boot-title { color: #111827; letter-spacing: 5px; font-weight: 950; margin: 0; font-size: 14px; text-transform: uppercase; }
      .bin-boot-subtitle { color: #667085; margin-top: 14px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
      #bin-boot-fallback { display: none; margin-top: 24px; max-width: 330px; padding: 18px; border-radius: 22px; background: rgba(255,255,255,0.94); border: 1px solid #E8E3D7; box-shadow: 0 18px 48px rgba(17,24,39,0.08); text-align: center; color: #667085; font-size: 13px; line-height: 1.55; font-weight: 650; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <script>
      (function() {
        var lang = localStorage.getItem('bin_language') || 'en';
        document.documentElement.lang = lang;
        document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
      })();
    </script>
    <div id="bin-boot-loader">
      <div class="bin-boot-ring"><div class="bin-boot-spinner"></div></div>
      <h2 class="bin-boot-title">BIN GROUP HOME OS</h2>
      <p class="bin-boot-subtitle">Loading white platinum property system...</p>
      <div id="bin-boot-fallback">Connection is taking longer than expected. Refresh once or open a private tab.</div>
    </div>
    <div id="root"></div>
    <script>
      (function() {
        var loader = document.getElementById('bin-boot-loader');
        var fallback = document.getElementById('bin-boot-fallback');
        var fallbackTimer = window.setTimeout(function(){ if (fallback) fallback.style.display = 'block'; }, 4500);
        var releaseTimer = window.setTimeout(function(){ if (loader) loader.classList.add('bin-boot-hidden'); }, 9000);
        window._BIN_MOUNT_SUCCESS = function(){
          window.clearTimeout(fallbackTimer);
          window.clearTimeout(releaseTimer);
          if (loader) loader.classList.add('bin-boot-hidden');
          window.setTimeout(function(){ if (loader && loader.parentNode) loader.parentNode.removeChild(loader); }, 450);
        };
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
