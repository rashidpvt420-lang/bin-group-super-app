<!DOCTYPE html>
<html lang="en">

<head>
    <base href="/admin/" />
    <meta charset="utf-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
        (function() {
            const metaDark = document.createElement('meta');
            metaDark.name = 'theme-color';
            metaDark.content = '#0F172A';
            metaDark.media = '(prefers-color-scheme: dark)';
            document.head.appendChild(metaDark);
            
            const metaLight = document.createElement('meta');
            metaLight.name = 'theme-color';
            metaLight.content = '#ffffff';
            metaLight.media = '(prefers-color-scheme: light)';
            document.head.appendChild(metaLight);
        })();
    </script>
    <title>BIN Group Admin Portal</title>
    <style>
        body { background-color: #020617; color: #FFFFFF; margin: 0; font-family: sans-serif; overflow: hidden; }
        .system-loader { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #020617; color: #DAA520; }
        .spinner { width: 48px; height: 48px; border: 4px solid #DAA520; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 24px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text { font-weight: 900; letter-spacing: 4px; text-transform: uppercase; font-size: 14px; text-align: center; }
        .compliance-bar { position: fixed; bottom: 0; width: 100%; text-align: center; padding: 25px; font-family: sans-serif; background: #000; border-top: 2px solid #C6A75E; color: #fff; }
        .compliance-bar-link { color: #C6A75E; text-decoration: none; margin: 0 15px; font-weight: bold; }
    </style>
</head>

<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
        <div class="system-loader">
            <div class="spinner"></div>
            <div class="loader-text">
                AUTHENTICATING SOVEREIGN IDENTITY...
            </div>
        </div>
    </div>
    <!-- BIN GROUP INSTITUTIONAL COMPLIANCE BAR -->
    <div class="compliance-bar">
        <a href="/privacy-policy.html" class="compliance-bar-link">Privacy Policy</a> | 
        <a href="/terms-of-service.html" class="compliance-bar-link">Terms of Service</a> | 
        <a href="/support" class="compliance-bar-link">Support</a>
    </div>

    <!-- [STABILITY] RECOVERY SCRIPT FOR INITIALIZATION HANGS -->
    <script>
        setTimeout(() => {
            const root = document.getElementById('root');
            if (root && root.innerText.includes('AUTHENTICATING SOVEREIGN IDENTITY')) {
                console.error("FATAL: Admin Terminal Initialization timed out at the HTML layer.");
                root.innerHTML = `
                    <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #020617; color: #ff4444; padding: 20px; text-align: center; font-family: sans-serif;">
                        <h1 style="font-weight: 900; letter-spacing: 4px;">ADMIN_INITIALIZATION_ERROR</h1>
                        <p style="color: #fff; opacity: 0.8; max-width: 600px;">The secure bundle failed to execute. Check your internet connection or browse from a supported UAE institutional proxy.</p>
                        <button onclick="window.location.reload()" style="background: #DAA520; color: #000; border: none; padding: 12px 24px; font-weight: 900; cursor: pointer; border-radius: 4px;">RELOAD SYSTEM</button>
                    </div>
                `;
            }
        }, 15000);
    </script>
</body>

</html>
