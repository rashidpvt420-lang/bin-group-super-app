name: BIN GROUP CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: bin-group-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Install, build, and test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java 21 for Firebase emulators
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Verify Java runtime
        run: java -version

      - name: Normalize Firestore rules before hygiene guard
        run: node scripts/normalize-firestore-rules.mjs

      - name: Repository hygiene guard
        run: node scripts/repo-hygiene-guard.mjs

      - name: Install dependencies with retry
        run: bash scripts/npm-install-retry.sh

      - name: Production stability guard
        run: npm run test:stability

      - name: TypeScript check
        run: npx tsc -p tsconfig.app.json --noEmit

      - name: Build shared package
        run: npm run build --workspace=@bin/shared

      - name: Build unified Vite app
        run: npm run build
        env:
          CI: false

      - name: Build functions
        run: npm run build --workspace=functions

      - name: Run security rules tests
        run: npm run test:rules
