name: Live Role Smoke Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

permissions:
  contents: read

concurrency:
  group: live-role-smoke
  cancel-in-progress: true

env:
  E2E_BASE_URL: https://bin-group-57c60.web.app
  E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
  E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
  E2E_OWNER_EMAIL: ${{ secrets.E2E_OWNER_EMAIL }}
  E2E_OWNER_PASSWORD: ${{ secrets.E2E_OWNER_PASSWORD }}
  E2E_TENANT_EMAIL: ${{ secrets.E2E_TENANT_EMAIL }}
  E2E_TENANT_PASSWORD: ${{ secrets.E2E_TENANT_PASSWORD }}
  E2E_TECHNICIAN_EMAIL: ${{ secrets.E2E_TECHNICIAN_EMAIL }}
  E2E_TECHNICIAN_PASSWORD: ${{ secrets.E2E_TECHNICIAN_PASSWORD }}
  E2E_BROKER_EMAIL: ${{ secrets.E2E_BROKER_EMAIL }}
  E2E_BROKER_PASSWORD: ${{ secrets.E2E_BROKER_PASSWORD }}

jobs:
  live-role-smoke:
    name: Verify production public and role flows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Show smoke test target
        run: echo "Running live smoke tests against ${E2E_BASE_URL}"

      - name: Validate public-smoke environment
        if: github.event_name != 'workflow_dispatch'
        run: node scripts/verify-e2e-env.mjs

      - name: Validate full role-smoke secrets
        if: github.event_name == 'workflow_dispatch'
        env:
          E2E_STRICT_ROLES: 'true'
        run: node scripts/verify-e2e-env.mjs

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run public smoke tests
        if: github.event_name != 'workflow_dispatch'
        run: npx playwright test --grep "production public smoke" --project=chromium-desktop

      - name: Run full role smoke tests
        if: github.event_name == 'workflow_dispatch'
        run: npx playwright test tests/e2e/live-role-smoke.spec.ts tests/e2e/hard-launch-routes.spec.ts --project=chromium-desktop

      - name: Run deep business workflow tests
        if: github.event_name == 'workflow_dispatch'
        run: npm run test:e2e:business

      - name: Create launch proof manifest
        if: always()
        shell: bash
        run: |
          mkdir -p launch-proof
          {
            echo "BIN GROUP launch proof manifest"
            echo "generated_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "repository=${GITHUB_REPOSITORY}"
            echo "ref=${GITHUB_REF}"
            echo "sha=${GITHUB_SHA}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_number=${GITHUB_RUN_NUMBER}"
            echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
            echo "event=${GITHUB_EVENT_NAME}"
            echo "actor=${GITHUB_ACTOR}"
            echo "base_url=${E2E_BASE_URL}"
            echo "admin_secret_configured=$([[ -n \"${E2E_ADMIN_EMAIL}\" && -n \"${E2E_ADMIN_PASSWORD}\" ]] && echo true || echo false)"
            echo "owner_secret_configured=$([[ -n \"${E2E_OWNER_EMAIL}\" && -n \"${E2E_OWNER_PASSWORD}\" ]] && echo true || echo false)"
            echo "tenant_secret_configured=$([[ -n \"${E2E_TENANT_EMAIL}\" && -n \"${E2E_TENANT_PASSWORD}\" ]] && echo true || echo false)"
            echo "technician_secret_configured=$([[ -n \"${E2E_TECHNICIAN_EMAIL}\" && -n \"${E2E_TECHNICIAN_PASSWORD}\" ]] && echo true || echo false)"
            echo "broker_secret_configured=$([[ -n \"${E2E_BROKER_EMAIL}\" && -n \"${E2E_BROKER_PASSWORD}\" ]] && echo true || echo false)"
            echo
            echo "artifact_file_sha256="
          } > launch-proof/manifest.txt
          if [ -d test-results ]; then find test-results -type f -print0 | sort -z | xargs -0 sha256sum >> launch-proof/manifest.txt; fi
          if [ -d playwright-report ]; then find playwright-report -type f -print0 | sort -z | xargs -0 sha256sum >> launch-proof/manifest.txt; fi
          sha256sum launch-proof/manifest.txt > launch-proof/manifest.sha256
          cat launch-proof/manifest.txt
          cat launch-proof/manifest.sha256

      - name: Upload launch proof manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: launch-proof-manifest
          path: launch-proof
          if-no-files-found: error

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-live-role-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-live-role-test-results
          path: test-results
          if-no-files-found: ignore
