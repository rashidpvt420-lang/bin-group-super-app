name: Firebase Production Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: firebase-production-deploy
  cancel-in-progress: true

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID || 'bin-group-57c60' }}
  VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
  VITE_APP_CHECK_SITE_KEY: ${{ secrets.VITE_APP_CHECK_SITE_KEY }}
  REACT_APP_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
  CI: true

jobs:
  validate-production-build:
    name: Validate production build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Repository hygiene guard
        run: node scripts/repo-hygiene-guard.mjs

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Create production environment file
        run: |
          printf 'VITE_GOOGLE_MAPS_API_KEY=%s\n' "${VITE_GOOGLE_MAPS_API_KEY}" > .env.production
          printf 'VITE_APP_CHECK_SITE_KEY=%s\n' "${VITE_APP_CHECK_SITE_KEY}" >> .env.production
          printf 'VITE_GOOGLE_MAPS_API_KEY=%s\n' "${VITE_GOOGLE_MAPS_API_KEY}" > .env.local
          printf 'VITE_APP_CHECK_SITE_KEY=%s\n' "${VITE_APP_CHECK_SITE_KEY}" >> .env.local

      - name: Production stability guard
        run: npm run test:stability

      - name: TypeScript check
        run: npx tsc -p tsconfig.app.json --noEmit

      - name: Lint root app
        run: npm run lint

      - name: Build shared package
        run: npm run build --workspace=@bin/shared

      - name: Build unified public and admin app
        run: npm run build

      - name: Prepare legacy admin hosting target from unified app
        run: |
          rm -rf apps/admin-panel/build
          mkdir -p apps/admin-panel
          cp -R dist apps/admin-panel/build

      - name: Build Firebase Functions
        run: npm run build --workspace=functions

      - name: Run Firestore rules tests
        run: npm run test:rules

      - name: Verify Firebase hosting entrypoints
        run: |
          test -f dist/index.html
          test -f apps/admin-panel/build/index.html
          ls -la dist/index.html
          ls -la apps/admin-panel/build/index.html

  deploy-firebase-production-stack:
    name: Deploy Firebase production stack
    runs-on: ubuntu-latest
    needs: validate-production-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Authenticate to Google Cloud by Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Repository hygiene guard
        run: node scripts/repo-hygiene-guard.mjs

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Create production environment file
        run: |
          printf 'VITE_GOOGLE_MAPS_API_KEY=%s\n' "${VITE_GOOGLE_MAPS_API_KEY}" > .env.production
          printf 'VITE_APP_CHECK_SITE_KEY=%s\n' "${VITE_APP_CHECK_SITE_KEY}" >> .env.production
          printf 'VITE_GOOGLE_MAPS_API_KEY=%s\n' "${VITE_GOOGLE_MAPS_API_KEY}" > .env.local
          printf 'VITE_APP_CHECK_SITE_KEY=%s\n' "${VITE_APP_CHECK_SITE_KEY}" >> .env.local

      - name: Build shared package
        run: npm run build --workspace=@bin/shared

      - name: Build unified public and admin app
        run: npm run build

      - name: Prepare legacy admin hosting target from unified app
        run: |
          rm -rf apps/admin-panel/build
          mkdir -p apps/admin-panel
          cp -R dist apps/admin-panel/build

      - name: Build Firebase Functions
        run: npm run build --workspace=functions

      - name: Deploy Firebase production stack
        run: npx firebase deploy --only hosting,functions,firestore:rules,firestore:indexes,storage --project "${GCP_PROJECT_ID}" --non-interactive --force
