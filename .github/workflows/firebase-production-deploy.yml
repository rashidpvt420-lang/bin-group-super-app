name: Firebase Production Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: firebase-production-deploy
  cancel-in-progress: true

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID || 'bin-group-57c60' }}
  VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
  VITE_APP_CHECK_SITE_KEY: ${{ secrets.VITE_APP_CHECK_SITE_KEY }}
  REACT_APP_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
  REACT_APP_FOUNDER_ADMIN_EMAILS: ${{ secrets.REACT_APP_FOUNDER_ADMIN_EMAILS || 'ceo@bin-groups.com' }}
  VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
  VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
  VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
  VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}
  CI: true

jobs:
  validate-production-build:
    name: Validate production build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Use Java 21 for Firebase emulators
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Verify Java runtime
        run: java -version

      - name: Repository hygiene guard
        run: node scripts/repo-hygiene-guard.mjs

      - name: Install dependencies with retry
        run: bash scripts/npm-install-retry.sh

      - name: Create production environment file
        run: |
          printf 'VITE_GOOGLE_MAPS_API_KEY=%s\n' "${VITE_GOOGLE_MAPS_API_KEY}" > .env.production
          printf 'VITE_APP_CHECK_SITE_KEY=%s\n' "${VITE_APP_CHECK_SITE_KEY}" >> .env.production
          printf 'VITE_FIREBASE_API_KEY=%s\n' "${VITE_FIREBASE_API_KEY}" >> .env.production
          printf 'VITE_FIREBASE_APP_ID=%s\n' "${VITE_FIREBASE_APP_ID}" >> .env.production
          printf 'VITE_FIREBASE_MESSAGING_SENDER_ID=%s\n' "${VITE_FIREBASE_MESSAGING_SENDER_ID}" >> .env.production
          printf 'VITE_FIREBASE_VAPID_KEY=%s\n' "${VITE_FIREBASE_VAPID_KEY}" >> .env.production
          cp .env.production .env.local

      - name: Production stability guard
        run: npm run test:stability

      - name: TypeScript check
        run: npx tsc -p tsconfig.app.json --noEmit

      - name: Lint root app
        run: npm run lint

      - name: Build shared package
        run: npm run build --workspace=@bin/shared

      - name: Build unified public app
        run: npm run build

      - name: Build dedicated admin panel
        run: npm run build:admin

      - name: Build Firebase Functions
        run: npm run build --workspace=functions

      - name: Run Firestore rules tests
        run: npm run test:rules

      - name: Verify Firebase hosting entrypoints
        run: |
          test -f dist/index.html
          test -f apps/admin-panel/build/index.html
          ls -la dist/index.html
          ls -la apps/admin-panel/build/index.html

  deploy-firebase-production-stack:
    name: Deploy Firebase production stack
    runs-on: ubuntu-latest
    needs: validate-production-build
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Deployment secrets preflight
        env:
          WIF_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          GCP_PROJECT_ID_SECRET: ${{ secrets.GCP_PROJECT_ID }}
          VITE_GOOGLE_MAPS_API_KEY_SECRET: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_APP_CHECK_SITE_KEY_SECRET: ${{ secrets.VITE_APP_CHECK_SITE_KEY }}
        run: |
          set -euo pipefail
          missing=0
          require_secret() {
            local key="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "::error::Missing required GitHub secret: $key"
              missing=1
            else
              echo "Found required GitHub secret: $key"
            fi
          }
          optional_secret() {
            local key="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "::warning::Optional GitHub secret is empty: $key"
            else
              echo "Found optional GitHub secret: $key"
            fi
          }
          require_secret "GCP_WORKLOAD_IDENTITY_PROVIDER" "${WIF_PROVIDER}"
          require_secret "GCP_SERVICE_ACCOUNT" "${GCP_SERVICE_ACCOUNT}"
          optional_secret "GCP_PROJECT_ID" "${GCP_PROJECT_ID_SECRET}"
          optional_secret "VITE_GOOGLE_MAPS_API_KEY" "${VITE_GOOGLE_MAPS_API_KEY_SECRET}"
          optional_secret "VITE_APP_CHECK_SITE_KEY" "${VITE_APP_CHECK_SITE_KEY_SECRET}"
          if [ "$missing" -ne 0 ]; then
            echo "Deployment cannot continue until required GitHub secrets are configured."
            exit 1
          fi

      - name: Authenticate to Google Cloud by Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Repository hygiene guard
        run: node scripts/repo-hygiene-guard.mjs

      - name: Install dependencies with retry
        run: bash scripts/npm-install-retry.sh

      - name: Create production environment file
        run: |
          printf 'VITE_GOOGLE_MAPS_API_KEY=%s\n' "${VITE_GOOGLE_MAPS_API_KEY}" > .env.production
          printf 'VITE_APP_CHECK_SITE_KEY=%s\n' "${VITE_APP_CHECK_SITE_KEY}" >> .env.production
          printf 'VITE_FIREBASE_API_KEY=%s\n' "${VITE_FIREBASE_API_KEY}" >> .env.production
          printf 'VITE_FIREBASE_APP_ID=%s\n' "${VITE_FIREBASE_APP_ID}" >> .env.production
          printf 'VITE_FIREBASE_MESSAGING_SENDER_ID=%s\n' "${VITE_FIREBASE_MESSAGING_SENDER_ID}" >> .env.production
          printf 'VITE_FIREBASE_VAPID_KEY=%s\n' "${VITE_FIREBASE_VAPID_KEY}" >> .env.production
          cp .env.production .env.local

      - name: Ensure optional Stripe function secrets exist
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail

          ensure_secret_version() {
            local name="$1"
            local fallback_value="$2"
            local secret_value="${!name:-}"

            if [ -z "$secret_value" ]; then
              secret_value="$fallback_value"
            fi

            if ! gcloud secrets describe "$name" --project "${GCP_PROJECT_ID}" >/dev/null 2>&1; then
              gcloud secrets create "$name" --project "${GCP_PROJECT_ID}" --replication-policy="automatic" >/dev/null
            fi

            printf '%s' "$secret_value" | gcloud secrets versions add "$name" --project "${GCP_PROJECT_ID}" --data-file=- >/dev/null
            echo "Ensured Secret Manager version for $name."
          }

          ensure_secret_version "STRIPE_SECRET_KEY" "mock_key"
          ensure_secret_version "STRIPE_WEBHOOK_SECRET" "mock_webhook_secret"

      - name: Build shared package
        run: npm run build --workspace=@bin/shared

      - name: Build unified public app
        run: npm run build

      - name: Build dedicated admin panel
        run: npm run build:admin

      - name: Build Firebase Functions
        run: npm run build --workspace=functions

      - name: Deploy critical production stack
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Firebase critical deploy attempt ${attempt}/3"
            if npx firebase deploy --only hosting,firestore:rules,firestore:indexes,storage --project "${GCP_PROJECT_ID}" --non-interactive --force; then
              echo "Firebase critical deploy succeeded on attempt ${attempt}."
              exit 0
            fi
            if [ "${attempt}" -lt 3 ]; then
              echo "Firebase deploy failed. Retrying in 30 seconds..."
              sleep 30
            fi
          done
          echo "::error::Firebase critical deploy failed after 3 attempts. Review Firebase service availability and IAM permissions."
          exit 1

      - name: Attempt Functions deploy and capture edge failures
        continue-on-error: true
        run: |
          set +e
          npx firebase deploy --only functions --project "${GCP_PROJECT_ID}" --non-interactive --force
          code=$?
          if [ "$code" -ne 0 ]; then
            echo "::warning::Functions deploy reported edge-function errors. Critical hosting/rules/storage deployment already succeeded. Review failing function names in this step log."
          fi
          exit 0
