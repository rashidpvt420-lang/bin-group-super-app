name: Persist Hardened Firestore Rules

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  persist-firestore-rules:
    name: Harden and persist Firestore rules
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Harden Firestore rules
        run: node scripts/harden-firestore-rules.mjs

      - name: Validate production guard
        run: node scripts/production-stability-guard.mjs

      - name: Commit hardened Firestore rules
        run: |
          if ! git diff --quiet -- firestore.rules; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add firestore.rules
            git commit -m "fix(firestore): persist hardened production rules"
            git push
          else
            echo "Firestore rules already match hardened production policy."
          fi
